<!DOCTYPE html>
<html>
<head>
  <title>Mindspire - Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Create Your Profile</h1>

  <input id="name" placeholder="Full Name"><br>
  <input id="dob" type="date"><br>
  <input id="school" placeholder="School Name"><br>
  <input id="class" placeholder="Class"><br>
  <input id="address" placeholder="City"><br>

  <select id="gender">
    <option value="">Select Gender</option>
    <option>Female</option>
    <option>Male</option>
    <option>Other</option>
  </select><br>

  <button onclick="doneProfile()">Done</button>
</div>

<script src="script.js"></script>
</body>
</html>
